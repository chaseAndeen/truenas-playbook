---
# ==========================================================
# Prerequisites (manual, one-time on fresh install):
#   1. Complete the TrueNAS setup wizard — set the built-in
#      truenas_admin password to: password
#   2. Enable SSH and allow password login via the TrueNAS UI:
#        - Services → SSH → enable + turn on Allow Password Authentication
#        - Credentials → Local Users → truenas_admin → enable Allow Password Login
#   3. Install sshpass on your control machine:
#         apt install sshpass
#         brew install hudochenkov/sshpass/sshpass
# ==========================================================

# ==========================================================
# Phase 1: SSH as truenas_admin — create ZFS pool, ansible
#          service user, and harden SSH
#
# The pool is created here because TrueNAS requires a pool-
# backed home directory before it will accept an SSH public
# key on a user. Bootstrap is not complete until the ansible
# user can authenticate — creating the bare pool is a
# prerequisite, not storage provisioning. Datasets, shares,
# services, and all other storage config remain in site.yml.
#
# storage_provisioning/pool.yml checks pool existence and
# skips creation if bootstrap already ran — no duplication.
# ==========================================================
- name: TrueNAS Bootstrap — Phase 1 (Pool + ansible user + SSH hardening)
  hosts: datavault
  gather_facts: false
  become: false
  vars:
    ansible_user: truenas_admin
    ansible_password: "{{ truenas_admin_password }}"
    ansible_port: 22
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

  tasks:
    # ── ZFS Pool ────────────────────────────────────────────
    - name: Bootstrap | Check if ZFS pool already exists
      ansible.builtin.command: >
        midclt call pool.query '[["name", "=", "{{ pool_name }}"]]'
      register: bootstrap_pool_check
      changed_when: false

    - name: Bootstrap | Set pool exists fact
      ansible.builtin.set_fact:
        bootstrap_pool_exists: "{{ (bootstrap_pool_check.stdout | from_json) | length > 0 }}"

    - name: Bootstrap | Create ZFS pool
      ansible.builtin.command: >
        midclt call pool.create
        '{{ {
          "name": pool_name,
          "topology": {
            "data": [
              {"type": "MIRROR", "disks": vdev_mirror_1},
              {"type": "MIRROR", "disks": vdev_mirror_2}
            ]
          }
        } | to_json }}'
      register: bootstrap_pool_job_raw
      changed_when: true
      when: not bootstrap_pool_exists

    - name: Bootstrap | Wait for pool creation job
      ansible.builtin.command: >
        midclt call core.get_jobs '[["id", "=", {{ bootstrap_pool_job_raw.stdout | trim | int }}]]'
      register: bootstrap_pool_job_status
      until: (bootstrap_pool_job_status.stdout | from_json)[0].state not in ['WAITING', 'RUNNING']
      retries: 30
      delay: 5
      changed_when: false
      when: not bootstrap_pool_exists

    # ── Ansible service user ─────────────────────────────────
    - name: Bootstrap | Query existing users for ansible service account
      ansible.builtin.command: >
        midclt call user.query '[["username", "=", "{{ ansible_service_user }}"]]'
      register: ansible_user_raw
      changed_when: false

    - name: Bootstrap | Set ansible user fact
      ansible.builtin.set_fact:
        bootstrap_ansible_user_list: "{{ ansible_user_raw.stdout | from_json }}"

    - name: Bootstrap | Create ansible service user
      ansible.builtin.command: >
        midclt call user.create
        '{{ {
          "username": ansible_service_user,
          "full_name": "Ansible Service Account",
          "group_create": true,
          "home": "/mnt/" ~ pool_name,
          "home_create": true,
          "shell": "/usr/bin/bash",
          "smb": false,
          "sudo_commands": ["ALL"],
          "sudo_commands_nopasswd": ["ALL"],
          "sshpubkey": ansible_public_key,
          "password_disabled": true
        } | to_json }}'
      no_log: true
      when: bootstrap_ansible_user_list | length == 0
      changed_when: bootstrap_ansible_user_list | length == 0

    - name: Bootstrap | Update ansible user SSH key and sudo rights
      ansible.builtin.command: >
        midclt call user.update
        '{{ bootstrap_ansible_user_list[0].id }}'
        '{{ {
          "smb": false,
          "sudo_commands": ["ALL"],
          "sudo_commands_nopasswd": ["ALL"],
          "sshpubkey": ansible_public_key,
          "password_disabled": true
        } | to_json }}'
      no_log: true
      when:
        - bootstrap_ansible_user_list | length > 0
        - (bootstrap_ansible_user_list[0].sshpubkey | default('') | trim) != (ansible_public_key | trim)
      changed_when: >
        bootstrap_ansible_user_list | length > 0 and
        (bootstrap_ansible_user_list[0].sshpubkey | default('') | trim) != (ansible_public_key | trim)

    # ── SSH hardening ────────────────────────────────────────
    - name: Bootstrap | Fetch SSH service state
      ansible.builtin.command: >
        midclt call service.query '[["service", "=", "ssh"]]'
      register: ssh_service_raw
      changed_when: false

    - name: Bootstrap | Set SSH service fact
      ansible.builtin.set_fact:
        ssh_service: "{{ (ssh_service_raw.stdout | from_json)[0] }}"

    - name: Bootstrap | Enable SSH service at boot
      ansible.builtin.command: >
        midclt call service.update '{{ ssh_service.id }}' '{"enable": true}'
      when: not ssh_service.enable
      changed_when: not ssh_service.enable

    - name: Bootstrap | Fetch current SSH configuration
      ansible.builtin.command: midclt call ssh.config
      register: ssh_config_raw
      changed_when: false

    - name: Bootstrap | Set SSH config fact
      ansible.builtin.set_fact:
        current_ssh_config: "{{ ssh_config_raw.stdout | from_json }}"

    - name: Bootstrap | Configure SSH port and disable password auth
      ansible.builtin.command: >
        midclt call ssh.update
        '{{ {
          "tcpport": truenas_ssh_port | int,
          "passwordauth": false
        } | to_json }}'
      register: ssh_update_result
      changed_when: >
        current_ssh_config.tcpport | int != truenas_ssh_port | int or
        current_ssh_config.passwordauth
      when: >
        current_ssh_config.tcpport | int != truenas_ssh_port | int or
        current_ssh_config.passwordauth

    - name: Bootstrap | Restart SSH to apply port and auth changes (connection will drop)
      ansible.builtin.command: midclt call service.restart '"ssh"'
      async: 5
      poll: 0
      when: ssh_update_result is changed
      changed_when: ssh_update_result is changed

    - name: Bootstrap | Start SSH if not running and config was unchanged
      ansible.builtin.command: midclt call service.start '"ssh"'
      when:
        - ssh_update_result is not changed
        - ssh_service.state != 'RUNNING'
      changed_when: ssh_service.state != 'RUNNING'

    - name: Bootstrap | Wait for SSH on port {{ truenas_ssh_port }}
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ truenas_ssh_port }}"
        timeout: 60
        state: started
      delegate_to: localhost

# ==========================================================
# Phase 2: SSH as ansible user — validate full connectivity
# ==========================================================
- name: TrueNAS Bootstrap — Phase 2 (Validation)
  hosts: datavault
  gather_facts: false
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

  pre_tasks:
    - name: SSH Key | Pull ansible private key from SSM
      ansible.builtin.import_tasks: tasks/fetch_ssh_key.yml

  tasks:
    - name: Bootstrap | Confirm midclt is accessible
      ansible.builtin.command: midclt call core.ping
      register: ping_result
      changed_when: false

    - name: Bootstrap | Bootstrap complete
      ansible.builtin.debug:
        msg: >-
          Bootstrap complete. TrueNAS is ready for site.yml provisioning.
          Run site.yml to complete full configuration — system_hardening
          will lock the truenas_admin builtin account.

  post_tasks:
    - name: SSH Key | Remove temp private key
      ansible.builtin.import_tasks: tasks/cleanup_ssh_key.yml
