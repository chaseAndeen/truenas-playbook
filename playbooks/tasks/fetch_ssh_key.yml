---
- name: SSH Key | Pull ansible private key from SSM
  ansible.builtin.command: >
    aws ssm get-parameter
    --name "/infra/common/ansible_private_key"
    --with-decryption
    --query "Parameter.Value"
    --output text
    --profile {{ aws_profile }}
    --region {{ aws_region }}
  register: ansible_key_raw
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true

- name: SSH Key | Write private key to temp file
  ansible.builtin.copy:
    content: "{{ ansible_key_raw.stdout | trim }}\n"
    dest: "/tmp/.ansible_ssh_key_{{ inventory_hostname }}"
    mode: '0600'
  delegate_to: localhost
  become: false
  no_log: true

- name: SSH Key | Set ansible_ssh_private_key_file
  ansible.builtin.set_fact:
    ansible_ssh_private_key_file: "/tmp/.ansible_ssh_key_{{ inventory_hostname }}"
  no_log: true
