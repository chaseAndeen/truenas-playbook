---
- name: Pool | Check if Pool "{{ pool_name }}" exists
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/pool?name={{ pool_name }}"
    method: GET
  register: pool_check

- name: Pool | Trigger RAID 10 Pool Creation
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/pool"
    method: POST
    body:
      name: "{{ pool_name }}"
      topology:
        data:
          - type: "MIRROR"
            disks: "{{ vdev_mirror_1 }}" 
          - type: "MIRROR"
            disks: "{{ vdev_mirror_2 }}"
  when: pool_check.json | length == 0
  register: pool_job_trigger

- name: Pool | Wait for Pool Creation Job to finish
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/core/get_jobs?id={{ pool_job_trigger.json }}"
    method: GET
  register: job_status
  until: job_status.json[0].state == 'SUCCESS'
  retries: 30
  delay: 5
  when: pool_job_trigger.json is defined
  failed_when: job_status.json[0].state == 'FAILED'

- name: Identity | Lookup UIDs for dataset owners
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/user/get_user_obj"
    method: POST
    body: 
      username: "{{ item.owner }}"
  loop: "{{ datasets }}"
  register: user_lookup
  no_log: true
  loop_control:
    label: "Looking up: {{ item.owner }}"

- name: Identity | Create Identity Map Fact
  ansible.builtin.set_fact:
    id_map: "{{ id_map | default({}) | combine({ item.item.name: { 'uid': item.json.pw_uid, 'gid': item.json.pw_gid } }) }}"
  loop: "{{ user_lookup.results }}"
  loop_control:
    label: "Mapping: {{ item.item.name }}" 

- name: Dataset | Fetch existing datasets
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/pool/dataset"
    method: GET
    body: {}
  register: existing_datasets

- name: Dataset | Create Missing Datasets (POST)
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/pool/dataset"
    method: POST
    body: >
      {
        "name": "{{ pool_name }}/{{ item.name }}",
        "type": "FILESYSTEM",
        "atime": "OFF",
        "recordsize": "{{ item.recordsize }}",
        "acltype": "{{ 'NFSV4' if item.share_type == 'smb' else 'POSIX' }}",
        "share_type": "{{ 'SMB' if item.share_type == 'smb' else 'GENERIC' }}",
        "encryption": true,
        "encryption_options": {
          "key": "{{ zfs_encryption_key }}",
          "generate_key": false
        },
        "inherit_encryption": false,
        "refquota": {{ (item.quota | regex_replace('[^0-9]', '') | int * (1024**4 if 'T' in item.quota else 1024**3)) | int if item.quota is defined else "null" }}
      }
  loop: "{{ datasets }}"
  when: (pool_name + '/' + item.name) not in (existing_datasets.json | map(attribute='id') | list)

- name: Dataset | Update Datasets (PUT)
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/pool/dataset/id/{{ (pool_name + '/' + item.name) | replace('/', '%2F') }}"
    method: PUT
    body: >
      {
        "atime": "OFF",
        "recordsize": "{{ item.recordsize }}",
        "refquota": {{ (item.quota | regex_replace('[^0-9]', '') | int * (1024**4 if 'T' in item.quota else 1024**3)) | int if item.quota is defined else "null" }}
      }
  vars:
    target_quota: "{{ (item.quota | regex_replace('[^0-9]', '') | int * (1024**4 if 'T' in item.quota else 1024**3)) | int if item.quota is defined else 0 }}"
    current_ds: "{{ existing_datasets.json | selectattr('id', 'equalto', pool_name + '/' + item.name) | first }}"
  loop: "{{ datasets }}"
  when: 
    - (pool_name + '/' + item.name) in (existing_datasets.json | map(attribute='id') | list)
    - (current_ds.refquota.rawvalue | int != target_quota | int) or (current_ds.recordsize.value != item.recordsize)

- name: ACL | Get current filesystem ACL state
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/filesystem/getacl"
    method: POST
    body: >
      {
        "path": "/mnt/{{ pool_name }}/{{ item.name }}"
      }
  loop: "{{ datasets }}"
  register: current_acl_results

- name: ACL | Apply Ownership and Shield (setacl)
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/filesystem/setacl"
    method: POST
    body: >
      {
        "path": "/mnt/{{ pool_name }}/{{ item.name }}",
        "uid": {{ id_map[item.name].uid | default(truenas_user.uid) }},
        "gid": {{ id_map[item.name].gid | default(truenas_user.uid) }},
        "dacl": {{ [ 
          { 
            "tag": "owner@", 
            "type": "ALLOW", 
            "perms": {"BASIC": "FULL_CONTROL"}, 
            "flags": {"BASIC": "INHERIT"} 
          },
          { 
            "tag": "group@", 
            "type": "ALLOW", 
            "perms": {"BASIC": "MODIFY"}, 
            "flags": {"BASIC": "INHERIT"} 
          }
        ] | to_json if item.share_type == 'smb' else [] | to_json }},
        "nfs41_flags": {
          "autoinherit": false,
          "protected": true
        },
        "options": {
          "recursive": true,
          "stripacl": {{ 'false' if item.share_type == 'smb' else 'true' }}
        }
      }
  vars:
    current_stat: "{{ current_acl_results.results | selectattr('item.name', 'equalto', item.name) | first }}"
    target_uid: "{{ id_map[item.name].uid | default(truenas_user.uid) }}"
    target_gid: "{{ id_map[item.name].gid | default(truenas_user.uid) }}"
  loop: "{{ datasets }}"
  when: >
    current_stat.json.uid != target_uid | int or 
    current_stat.json.gid != target_gid | int or
    (item.share_type == 'smb' and current_stat.json.acltype != 'NFS4')

- name: Share | Get current SMB and NFS share configurations
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/sharing/{{ item }}"
    method: GET
    body: {}
  loop: ["smb", "nfs"]
  register: current_shares

- name: Share | Extract Share Lists
  set_fact:
    smb_list: "{{ (current_shares.results | selectattr('item', 'equalto', 'smb') | first).json | default([]) }}"
    nfs_list: "{{ (current_shares.results | selectattr('item', 'equalto', 'nfs') | first).json | default([]) }}"

- name: Share | Create SMB Shares (Fresh Run)
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/sharing/smb"
    method: POST
    body:
      path: "/mnt/{{ pool_name }}/{{ item.name }}"
      name: "{{ item.name }}"
      purpose: "DEFAULT_SHARE"
      enabled: true
      options:
        hostsallow: "{{ trusted_networks }}"
  loop: "{{ datasets | selectattr('share_type', 'equalto', 'smb') | list }}"
  when: "('/mnt/' + pool_name + '/' + item.name) not in (smb_list | map(attribute='path') | list)"
  loop_control:
    label: "Creating SMB Share: {{ item.name }}"

- name: Share | Update SMB Shares (Nested Options)
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/sharing/smb/id/{{ existing_share.id }}"
    method: PUT
    body:
      options:
        hostsallow: "{{ trusted_networks }}"
  vars:
    existing_share: "{{ smb_list | selectattr('path', 'equalto', '/mnt/' + pool_name + '/' + item.name) | first | default({}) }}"
  loop: "{{ datasets | selectattr('share_type', 'equalto', 'smb') | list }}"
  when:
    - existing_share.id is defined
    - (existing_share.options.hostsallow | default([]) | sort) != (trusted_networks | sort)
  loop_control:
    label: "Updating SMB Share: {{ item.name }}"

- name: Share | Create Missing NFS Shares
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/sharing/nfs"
    method: POST
    body:
      path: "/mnt/{{ pool_name }}/{{ item.name }}"
      networks: "{{ server_networks }}"
      mapall_user: "{{ item.owner if item.nfs_map | default('') == 'mapall' else '' }}"
      mapall_group: "{{ item.group if item.nfs_map | default('') == 'mapall' else '' }}"
      maproot_user: "{{ 'root' if item.nfs_map | default('') == 'maproot' else '' }}"
      maproot_group: "{{ 'wheel' if item.nfs_map | default('') == 'maproot' else '' }}"
      enabled: true
  vars:
    existing_share: "{{ nfs_list | selectattr('path', 'equalto', '/mnt/' + pool_name + '/' + item.name) | first | default({}) }}"
  loop: "{{ datasets | selectattr('share_type', 'equalto', 'nfs') | list }}"
  when: existing_share.id is not defined
  loop_control:
    label: "NFS Create: {{ item.name }}"

- name: Service | Get service statuses (cifs and nfs)
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/service?service={{ item }}"
    method: GET
  loop: ["cifs", "nfs"]
  register: service_status_check

- name: Service | Ensure Services are Running and Enabled
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/service/id/{{ item.json[0].id }}"
    method: PUT
    body:
      enable: true
  loop: "{{ service_status_check.results }}"
  register: service_config
  no_log: true
  loop_control:
    label: "Enabling Service: {{ item.item }}"

- name: Service | Force Start Services if Stopped
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/service/start"
    method: POST
    body:
      service: "{{ item.json[0].service }}"
  loop: "{{ service_status_check.results }}"
  when: item.json[0].state != 'RUNNING'
  loop_control:
    label: "Starting: {{ item.item }}"

- name: Snapshot | Get existing snapshot tasks
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/pool/snapshottask"
    method: GET
    body: {}
  register: existing_snapshots

- name: Snapshot | Create Periodic Snapshot Task
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/pool/snapshottask"
    method: POST
    body:
      dataset: "{{ pool_name }}"
      recursive: true
      lifetime_value: 2
      lifetime_unit: "WEEK"
      naming_schema: "%Y-%m-%d_%H-%M" 
      schedule:
        minute: "0"
        hour: "*/6"
        dom: "*"
        month: "*"
        dow: "*"
      enabled: true
  when: existing_snapshots.json | selectattr('dataset', 'equalto', pool_name) | list | length == 0
  no_log: true
  loop_control:
    label: "Snapshot Task: {{ pool_name }}"

- name: CloudSync | Query existing Cloud Credentials
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/cloudsync/credentials"
    method: GET
    body: {}
  register: existing_creds

- name: CloudSync | Provision S3 Cloud Credential
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/cloudsync/credentials"
    method: POST
    body:
      name: "Amazon S3"
      provider:
        type: "S3"
        access_key_id: "{{ aws_access_key }}"
        secret_access_key: "{{ aws_secret_key }}"
        endpoint: "https://{{ s3_endpoint }}"
  when: "existing_creds.json | selectattr('name', 'equalto', 'Amazon S3') | list | length == 0"

- name: CloudSync | Get Updated Credential ID for Task linking
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/cloudsync/credentials"
    method: GET
    body: {}
  register: final_creds

- name: CloudSync | Query existing Cloud Sync Tasks
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/cloudsync"
    method: GET
    body: {} 
  register: existing_tasks_check

- name: CloudSync | Extract S3 Credential ID
  ansible.builtin.set_fact:
    dynamic_cred_id: "{{ (final_creds.json | selectattr('name', 'equalto', 'Amazon S3') | map(attribute='id') | first) | int }}"

- name: CloudSync | Provision Nightly Encrypted Cloud Sync Task
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}/api/v2.0/cloudsync"
    method: POST
    body: >
      {
        "description": "Nightly Sync of vault to S3",
        "direction": "PUSH",
        "transfer_mode": "SYNC",
        "path": "/mnt/{{ pool_name }}",
        "credentials": {{ dynamic_cred_id }},
        "snapshot": false,
        "enabled": true,
        "encryption": true,
        "filename_encryption": true,
        "encryption_password": "{{ cloudsync_password }}",
        "encryption_salt": "{{ cloudsync_salt }}",
        "attributes": {
          "bucket": "{{ s3_bucket_name }}",
          "folder": "",
          "region": "{{ s3_region }}",
          "storage_class": "STANDARD"
        },
        "schedule": {
          "minute": "0",
          "hour": "2",
          "dom": "*",
          "month": "*",
          "dow": "*"
        }
      }
  when: "existing_tasks_check.json | selectattr('description', 'equalto', 'Nightly Sync of vault to S3') | list | length == 0"